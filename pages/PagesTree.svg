<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#283593;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c62828;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d32f2f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="operGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388e3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lookupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e65100;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef6c00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="adminGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a148c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a1b9a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="infraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#37474f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#455a64;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#f5f5f5" rx="8"/>

  <!-- ===== ROOT ===== -->
  <rect x="420" y="20" width="360" height="48" rx="24" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="18" font-weight="bold">🌙 Charity Org. System</text>

  <!-- Root line -->
  <line x1="600" y1="68" x2="600" y2="90" stroke="#555" stroke-width="2"/>

  <!-- Home.html -->
  <rect x="460" y="90" width="280" height="36" rx="18" fill="#eceff1" stroke="#78909c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="113" text-anchor="middle" fill="#37474f" font-size="13" font-weight="bold">🏠 Home.html — Sign-in · First-run setup</text>

  <!-- Line from Home to branches -->
  <line x1="600" y1="126" x2="600" y2="150" stroke="#555" stroke-width="2"/>
  <line x1="200" y1="150" x2="1000" y2="150" stroke="#555" stroke-width="2"/>
  <line x1="200" y1="150" x2="200" y2="170" stroke="#555" stroke-width="2"/>
  <line x1="600" y1="150" x2="600" y2="170" stroke="#555" stroke-width="2"/>
  <line x1="1000" y1="150" x2="1000" y2="170" stroke="#555" stroke-width="2"/>

  <!-- ===== COLUMN 1: Core Pages ===== -->
  <rect x="40" y="170" width="320" height="36" rx="18" fill="url(#coreGrad)" filter="url(#shadow)"/>
  <text x="200" y="193" text-anchor="middle" fill="white" font-size="14" font-weight="bold">📄 Core Pages</text>

  <line x1="200" y1="206" x2="200" y2="228" stroke="#c62828" stroke-width="1.5"/>

  <!-- Dashboard -->
  <rect x="60" y="228" width="280" height="32" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
  <text x="200" y="248" text-anchor="middle" fill="#b71c1c" font-size="12">Dashboard — Desktop · Analytics</text>

  <!-- OwnerDashboard -->
  <rect x="60" y="268" width="280" height="32" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
  <text x="200" y="288" text-anchor="middle" fill="#b71c1c" font-size="12">OwnerDashboard — Mobile · Owner on</text>

  <!-- Reports -->
  <rect x="60" y="308" width="280" height="32" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
  <text x="200" y="328" text-anchor="middle" fill="#b71c1c" font-size="12">Reports.html — Monthly · Annual</text>

  <!-- Donors -->
  <rect x="60" y="348" width="280" height="32" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
  <text x="200" y="368" text-anchor="middle" fill="#b71c1c" font-size="12">Donors.html — Donor registry</text>

  <!-- Beneficiaries -->
  <rect x="60" y="388" width="280" height="32" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
  <text x="200" y="408" text-anchor="middle" fill="#b71c1c" font-size="12">Beneficiaries — Case registry</text>

  <!-- Receipts -->
  <rect x="60" y="428" width="280" height="32" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
  <text x="200" y="448" text-anchor="middle" fill="#b71c1c" font-size="12">Receipts.html — IN &amp; OUT receipts</text>

  <!-- Inventory -->
  <rect x="60" y="468" width="280" height="32" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
  <text x="200" y="488" text-anchor="middle" fill="#b71c1c" font-size="12">Inventory.html — In-kind stock</text>

  <!-- Projects -->
  <rect x="60" y="508" width="280" height="32" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
  <text x="200" y="528" text-anchor="middle" fill="#b71c1c" font-size="12">Projects.html — Charity projects</text>

  <!-- ===== COLUMN 2: Operational Modules ===== -->
  <rect x="440" y="170" width="320" height="36" rx="18" fill="url(#operGrad)" filter="url(#shadow)"/>
  <text x="600" y="193" text-anchor="middle" fill="white" font-size="14" font-weight="bold">⚙️ Operational Modules</text>

  <line x1="600" y1="206" x2="600" y2="228" stroke="#2e7d32" stroke-width="1.5"/>

  <!-- Installation -->
  <rect x="460" y="228" width="280" height="32" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="600" y="248" text-anchor="middle" fill="#1b5e20" font-size="12">Installation — Zakat, Sadaqah, Education, Health</text>

  <!-- Need Types -->
  <rect x="460" y="268" width="280" height="32" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="600" y="288" text-anchor="middle" fill="#1b5e20" font-size="12">Need Types — Monthly, Medical</text>

  <!-- Recurring -->
  <rect x="460" y="308" width="280" height="32" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="600" y="328" text-anchor="middle" fill="#1b5e20" font-size="12">Recurring.html — Scheduled expenses</text>

  <!-- Payment Method -->
  <rect x="460" y="348" width="280" height="32" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="600" y="368" text-anchor="middle" fill="#1b5e20" font-size="12">Payment Method — Cash, Transfer...</text>

  <!-- Notif Prefs -->
  <rect x="460" y="388" width="280" height="32" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="600" y="408" text-anchor="middle" fill="#1b5e20" font-size="12">Notif. Prefs — WhatsApp, SMS...</text>

  <!-- ===== COLUMN 3: Lookup Pages ===== -->
  <rect x="840" y="170" width="320" height="36" rx="18" fill="url(#lookupGrad)" filter="url(#shadow)"/>
  <text x="1000" y="193" text-anchor="middle" fill="white" font-size="14" font-weight="bold">🔍 Lookup Pages</text>

  <line x1="1000" y1="206" x2="1000" y2="228" stroke="#e65100" stroke-width="1.5"/>

  <!-- Lookup items -->
  <rect x="860" y="228" width="280" height="32" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="1000" y="248" text-anchor="middle" fill="#e65100" font-size="12">Donor Lookup</text>

  <rect x="860" y="268" width="280" height="32" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="1000" y="288" text-anchor="middle" fill="#e65100" font-size="12">Case Lookup</text>

  <rect x="860" y="308" width="280" height="32" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="1000" y="328" text-anchor="middle" fill="#e65100" font-size="12">Project Lookup</text>

  <rect x="860" y="348" width="280" height="32" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="1000" y="368" text-anchor="middle" fill="#e65100" font-size="12">Inventory Lookup</text>

  <rect x="860" y="388" width="280" height="32" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="1000" y="408" text-anchor="middle" fill="#e65100" font-size="12">Receipt Lookup</text>

  <!-- ===== COLUMN 4: Admin Pages ===== -->
  <rect x="840" y="450" width="320" height="36" rx="18" fill="url(#adminGrad)" filter="url(#shadow)"/>
  <text x="1000" y="473" text-anchor="middle" fill="white" font-size="14" font-weight="bold">👑 Admin Pages</text>

  <line x1="1000" y1="486" x2="1000" y2="508" stroke="#4a148c" stroke-width="1.5"/>

  <!-- Settings -->
  <rect x="860" y="508" width="280" height="32" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1"/>
  <text x="1000" y="528" text-anchor="middle" fill="#4a148c" font-size="12">Settings.html — Config · All users</text>

  <!-- Permissions -->
  <rect x="860" y="548" width="280" height="32" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1"/>
  <text x="1000" y="568" text-anchor="middle" fill="#4a148c" font-size="12">Permissions — SuperAdmin only</text>

  <!-- ===== SHARED INFRASTRUCTURE SECTION ===== -->
  <line x1="600" y1="150" x2="600" y2="640" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4"/>

  <rect x="250" y="620" width="700" height="48" rx="24" fill="url(#infraGrad)" filter="url(#shadow)"/>
  <text x="600" y="650" text-anchor="middle" fill="white" font-size="15" font-weight="bold">🔄 Shared Infrastructure — loaded on every page</text>

  <line x1="600" y1="668" x2="600" y2="695" stroke="#37474f" stroke-width="2"/>

  <!-- Infra modules row -->
  <rect x="80" y="695" width="180" height="38" rx="8" fill="#eceff1" stroke="#90a4ae" stroke-width="1.5"/>
  <text x="170" y="718" text-anchor="middle" fill="#37474f" font-size="12" font-weight="bold">📁 utils.js</text>

  <rect x="280" y="695" width="180" height="38" rx="8" fill="#eceff1" stroke="#90a4ae" stroke-width="1.5"/>
  <text x="370" y="718" text-anchor="middle" fill="#37474f" font-size="12" font-weight="bold">🎨 styles.css</text>

  <rect x="480" y="695" width="180" height="38" rx="8" fill="#eceff1" stroke="#90a4ae" stroke-width="1.5"/>
  <text x="570" y="718" text-anchor="middle" fill="#37474f" font-size="12" font-weight="bold">🔐 auth.js</text>

  <rect x="680" y="695" width="200" height="38" rx="8" fill="#eceff1" stroke="#90a4ae" stroke-width="1.5"/>
  <text x="780" y="718" text-anchor="middle" fill="#37474f" font-size="12" font-weight="bold">Google OAuth · Session</text>

  <rect x="900" y="695" width="220" height="38" rx="8" fill="#eceff1" stroke="#90a4ae" stroke-width="1.5"/>
  <text x="1010" y="711" text-anchor="middle" fill="#37474f" font-size="11" font-weight="bold">ID · Timestamps · CRUD</text>
  <text x="1010" y="725" text-anchor="middle" fill="#37474f" font-size="11" font-weight="bold">PermDesign system · All components</text>

  <!-- ===== LEGEND ===== -->
  <rect x="80" y="770" width="1040" height="55" rx="10" fill="white" stroke="#cfd8dc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="790" fill="#37474f" font-size="12" font-weight="bold">Legend:</text>
  <rect x="170" y="778" width="60" height="20" rx="10" fill="url(#coreGrad)"/>
  <text x="200" y="793" text-anchor="middle" fill="white" font-size="9">Core</text>
  <rect x="250" y="778" width="60" height="20" rx="10" fill="url(#operGrad)"/>
  <text x="280" y="793" text-anchor="middle" fill="white" font-size="9">Operational</text>
  <rect x="330" y="778" width="60" height="20" rx="10" fill="url(#lookupGrad)"/>
  <text x="360" y="793" text-anchor="middle" fill="white" font-size="9">Lookup</text>
  <rect x="410" y="778" width="60" height="20" rx="10" fill="url(#adminGrad)"/>
  <text x="440" y="793" text-anchor="middle" fill="white" font-size="9">Admin</text>
  <rect x="490" y="778" width="60" height="20" rx="10" fill="url(#infraGrad)"/>
  <text x="520" y="793" text-anchor="middle" fill="white" font-size="9">Shared infra</text>

  <text x="600" y="815" text-anchor="middle" fill="#90a4ae" font-size="10">Charity Organization Management System — Architecture Overview</text>
</svg>