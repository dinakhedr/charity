<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الصلاحيات — نظام إدارة الجمعية</title>
  <link rel="manifest" href="/charity/manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23185FA5'/><path d='M50 20C38 20 28 30 28 42c0 8 4 15 11 19l-3 19h28l-3-19c7-4 11-11 11-19 0-12-10-22-22-22z' fill='%231D9E75'/></svg>">
  <link rel="stylesheet" href="../assets/styles.css">

  <style>
    /* ── Permission Matrix ──────────────────────────────────── */
    .perm-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
    .perm-table th {
      padding:10px 14px; font-size:0.72rem; font-weight:600;
      color:var(--text-secondary); text-transform:uppercase;
      letter-spacing:0.05em; text-align:right;
      background:var(--bg-page); border-bottom:1px solid var(--border-default);
      white-space:nowrap;
    }
    .perm-table td {
      padding:10px 14px; border-bottom:1px solid var(--border-default);
      vertical-align:middle;
    }
    .perm-table tbody tr:hover { background:var(--bg-hover); }
    .perm-table tbody tr:last-child td { border-bottom:none; }

    /* Toggle switch */
    .toggle-wrap { display:flex; align-items:center; justify-content:center; }
    .toggle {
      position:relative; width:36px; height:20px;
      display:inline-block; flex-shrink:0;
    }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider {
      position:absolute; inset:0; background:var(--border-strong);
      border-radius:20px; cursor:pointer;
      transition:background var(--transition-fast);
    }
    .toggle-slider::before {
      content:''; position:absolute;
      width:14px; height:14px; border-radius:50%;
      background:#fff; left:3px; top:3px;
      transition:transform var(--transition-fast);
    }
    .toggle input:checked + .toggle-slider { background:var(--green-400); }
    .toggle input:checked + .toggle-slider::before { transform:translateX(16px); }
    .toggle input:disabled + .toggle-slider { opacity:0.4; cursor:not-allowed; }

    /* Page group label */
    .page-group-row td {
      background:var(--blue-50); font-size:0.72rem; font-weight:600;
      color:var(--blue-700); letter-spacing:0.04em; padding:6px 14px;
      border-bottom:1px solid var(--border-default);
    }

    /* Role selector */
    .role-selector {
      display:flex; align-items:center; gap:12px;
      padding:16px 20px; background:var(--bg-card);
      border-bottom:1px solid var(--border-default);
    }

    /* Status badge */
    .status-active   { background:var(--color-in-bg);      color:var(--color-in); }
    .status-inactive { background:var(--color-neutral-bg);  color:var(--color-neutral); }

    /* Role card */
    .role-card {
      background:var(--bg-card); border:1px solid var(--border-default);
      border-radius:var(--radius-lg); padding:18px 20px;
      display:flex; align-items:center; gap:14px;
      transition:border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .role-card:hover { border-color:var(--blue-400); box-shadow:var(--shadow-card); }
    .role-icon {
      width:40px; height:40px; border-radius:var(--radius-sm);
      background:var(--blue-50); display:flex; align-items:center;
      justify-content:center; flex-shrink:0; color:var(--blue-600);
    }
    .role-icon svg { width:18px; height:18px; }
    .role-info { flex:1; min-width:0; }
    .role-name { font-weight:600; font-size:0.9rem; color:var(--text-primary); }
    .role-desc { font-size:0.78rem; color:var(--text-secondary); margin-top:2px; }
    .role-count { font-size:0.75rem; color:var(--text-muted); }

    /* Saving indicator */
    .saving-pill {
      display:inline-flex; align-items:center; gap:6px;
      font-size:0.75rem; color:var(--text-muted);
      padding:4px 10px; border-radius:20px;
      background:var(--bg-page); border:1px solid var(--border-default);
      transition:all var(--transition-base);
    }
    .saving-pill.saving { color:var(--color-warning); border-color:var(--color-warning-bg); }
    .saving-pill.saved  { color:var(--color-in);      border-color:var(--color-in-border); }
    .saving-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
  </style>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">

    <!-- Topbar -->
    <header class="topbar">
      <div>
        <div class="topbar-title" data-t="permissionsTitle"></div>
        <div class="topbar-subtitle" data-t="permissionsSubtitle"></div>
      </div>
      <div class="topbar-actions">
        <div class="saving-pill" id="savingPill">
          <div class="saving-dot"></div>
          <span id="savingText" data-t="allSaved"></span>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content" id="pageContent" style="opacity:0;">

      <!-- Tabs -->
      <div class="tabs" id="mainTabs">
        <div class="tab active" onclick="switchTab('users')"  id="tab-users"  data-t="tabUsers"></div>
        <div class="tab"        onclick="switchTab('roles')"  id="tab-roles"  data-t="tabRoles"></div>
        <div class="tab"        onclick="switchTab('matrix')" id="tab-matrix" data-t="tabMatrix"></div>
      </div>

      <!-- ── TAB: Users ──────────────────────────────────────── -->
      <div id="tabUsers">
        <div class="page-header">
          <div class="page-header-left">
            <h2 class="page-title" style="font-size:1.1rem;" data-t="usersList"></h2>
          </div>
          <div class="page-header-actions">
            <div class="table-search" style="max-width:220px;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" data-t-placeholder="search" oninput="filterUsers(this.value)">
            </div>
            <button class="btn btn-primary" onclick="openUserModal()" data-requires="create" data-t="addUser"></button>
          </div>
        </div>

        <!-- Show deleted toggle -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;" id="showDeletedToggle">
          <label class="form-check">
            <input type="checkbox" id="showDeleted" onchange="toggleDeleted(this.checked)">
            <span class="form-check-label text-sm text-muted" data-t="showDeleted"></span>
          </label>
        </div>

        <div class="table-wrapper">
          <table class="data-table" id="usersTable">
        <thead>
          <tr>
            <th style="text-align:right;" data-t="colUser"></th>
            <th style="text-align:right;width:180px;" data-t="colRole"></th>
            <th style="text-align:right;width:100px;" data-t="colStatus"></th>
            <th style="text-align:right;width:160px;" data-t="colLastLogin"></th>
            <th style="text-align:right;width:130px;" data-t="colDateAdded"></th>
            <th style="width:80px;"></th>
          </tr>
        </thead>
            <tbody id="usersBody">
              <tr><td colspan="6" style="text-align:center;padding:40px;">
                <div class="spinner" style="margin:0 auto 12px;"></div>
                <span data-t="loading"></span>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ── TAB: Roles ──────────────────────────────────────── -->
      <div id="tabRoles" style="display:none;">
        <div class="page-header">
          <div class="page-header-left">
            <h2 class="page-title" style="font-size:1.1rem;" data-t="rolesTitle"></h2>
            <p class="page-subtitle" data-t="rolesSubtitle"></p>
          </div>
          <button class="btn btn-primary" onclick="openRoleModal()" data-requires="create">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span data-t="addCustomRole"></span>
          </button>
        </div>

        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;" id="rolesGrid">
          <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">
            <div class="spinner" style="margin:0 auto 12px;"></div><span data-t="loading"></span>
          </div>
        </div>
      </div>

      <!-- ── TAB: Permissions Matrix ─────────────────────────── -->
      <div id="tabMatrix" style="display:none;">
        <div class="page-header">
          <div class="page-header-left">
            <h2 class="page-title" style="font-size:1.1rem;" data-t="matrixTitle"></h2>
            <p class="page-subtitle" data-t="matrixSubtitle"></p>
          </div>
          <div class="saving-pill" id="matrixSavingPill" style="display:none;">
            <div class="saving-dot"></div>
            <span id="matrixSavingText" data-t="saving"></span>
          </div>
        </div>

        <!-- Role selector -->
        <div class="card" style="margin-bottom:20px;">
          <div class="role-selector">
            <label class="form-label" style="margin:0;white-space:nowrap;" data-t="colRole"></label>
            <select class="form-select" id="matrixRoleSelect" onchange="loadMatrix(this.value)" style="max-width:280px;">
              <option value="" data-t="selectRole"></option>
            </select>
            <div style="margin-right:auto;font-size:0.8rem;color:var(--text-muted);" id="matrixRoleDesc"></div>
          </div>
        </div>

        <div class="table-wrapper" id="matrixWrapper" style="display:none;">
          <table class="perm-table" id="matrixTable">
            <thead>
              <tr>
                <th style="min-width:160px;" data-t="colPage"></th>
                <th style="text-align:center;min-width:80px;">
                  <div style="font-weight:600;" data-t="colView"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);margin-top:2px;" data-t="colViewEn"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);" data-t="colViewAr"></div>
                </th>
                <th style="text-align:center;min-width:80px;">
                  <div style="font-weight:600;" data-t="colCreate"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);margin-top:2px;" data-t="colCreateEn"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);" data-t="colCreateAr"></div>
                </th>
                <th style="text-align:center;min-width:80px;">
                  <div style="font-weight:600;" data-t="colEdit"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);margin-top:2px;" data-t="colEditEn"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);" data-t="colEditAr"></div>
                </th>
                <th style="text-align:center;min-width:80px;">
                  <div style="font-weight:600;" data-t="colDelete"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);margin-top:2px;" data-t="colDeleteEn"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);" data-t="colDeleteAr"></div>
                </th>
                <th style="text-align:center;min-width:80px;">
                  <div style="font-weight:600;" data-t="colViewDeleted"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);margin-top:2px;" data-t="colViewDeletedEn"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);" data-t="colViewDeletedAr"></div>
                </th>
                <th style="text-align:center;min-width:80px;">
                  <div style="font-weight:600;" data-t="colSensitive"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);margin-top:2px;" data-t="colSensitiveEn"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);" data-t="colSensitiveAr"></div>
                </th>
                <th style="text-align:center;min-width:80px;">
                  <div style="font-weight:600;" data-t="colExport"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);margin-top:2px;" data-t="colExportEn"></div>
                  <div style="font-weight:400;font-size:0.65rem;color:var(--text-muted);" data-t="colExportAr"></div>
                </th>
              </tr>
            </thead>
            <tbody id="matrixBody"></tbody>
          </table>
        </div>

        <div class="empty-state" id="matrixEmpty">
          <div class="empty-state-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <div class="empty-state-title" data-t="selectRoleFirst"></div>
          <div class="empty-state-text" data-t="selectRoleHint"></div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- ── Modal: Add / Edit User ─────────────────────────────── -->
<div class="modal-overlay" id="userModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 class="modal-title" id="userModalTitle" data-t="addUserTitle"></h3>
      <button class="modal-close" onclick="closeModal('userModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="uRecordID">
      <div class="form-grid" style="gap:14px;">
        <div class="form-group span-full">
          <label class="form-label" data-t="fullName"> <span class="required">*</span></label>
          <input type="text" class="form-input" id="uFullName" data-required="true" placeholder="">
        </div>
        <div class="form-group span-full">
          <label class="form-label" data-t="emailGoogle"> <span class="required">*</span></label>
          <input type="email" class="form-input" id="uEmail" data-required="true" placeholder="user@gmail.com" dir="ltr">
          <span class="form-hint" data-t="emailHint"></span>
        </div>
        <div class="form-group">
          <label class="form-label" data-t="colRole"> <span class="required">*</span></label>
          <select class="form-select" id="uRole" data-required="true">
            <option value="" data-t="selectRole"></option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" data-t="status"></label>
          <select class="form-select" id="uStatus">
            <option value="Active" data-t="active"></option>
            <option value="Inactive" data-t="inactive"></option>
          </select>
        </div>
        <div class="form-group span-full">
          <label class="form-label" data-t="notes"></label>
          <textarea class="form-textarea" id="uNotes" rows="2" placeholder=""></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('userModal')" data-t="cancel"></button>
      <button class="btn btn-primary" onclick="saveUser()" id="saveUserBtn" data-t="saveUser"></button>
    </div>
  </div>
</div>

<!-- ── Modal: Add / Edit Role ─────────────────────────────── -->
<div class="modal-overlay" id="roleModal">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3 class="modal-title" id="roleModalTitle" data-t="addRoleTitle"></h3>
      <button class="modal-close" onclick="closeModal('roleModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="rRecordID">
      <div class="form-grid" style="gap:14px;">
        <div class="form-group span-full">
          <label class="form-label" data-t="roleNameEn"> <span class="required">*</span></label>
          <input type="text" class="form-input" id="rRoleID" data-required="true" placeholder="e.g. FieldWorker" dir="ltr">
          <span class="form-hint" data-t="roleNameHint"></span>
        </div>
        <div class="form-group span-full">
          <label class="form-label" data-t="description"> <span class="required">*</span></label>
          <input type="text" class="form-input" id="rDesc" data-required="true" placeholder="">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('roleModal')" data-t="cancel"></button>
      <button class="btn btn-primary" onclick="saveRole()" id="saveRoleBtn" data-t="saveRole"></button>
    </div>
  </div>
</div>

<!-- ── Confirm Modal ──────────────────────────────────────── -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box modal-sm">
    <div class="modal-body" style="text-align:center;padding:32px 24px 20px;">
      <div class="modal-confirm-icon danger" id="confirmIcon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
        </svg>
      </div>
      <div class="modal-confirm-title" id="confirmTitle" data-t="confirmTitle"></div>
      <div class="modal-confirm-text" id="confirmMsg"></div>
    </div>
    <div class="modal-footer" style="justify-content:center;gap:12px;">
      <button class="btn btn-secondary" onclick="closeModal('confirmModal')" data-t="cancel"></button>
      <button class="btn btn-danger" id="confirmOk" data-t="confirm"></button>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="../assets/utils.js"></script>
<script src="../assets/auth.js"></script>
<script>
'use strict';

/* ── State ──────────────────────────────────────────────── */
let _sid    = null;
let _email  = null;
let _perms  = null;
let _users  = [];
let _roles  = [];
let _matrix = [];
let _showDeleted   = false;
let _editingUser   = null;
let _editingRole   = null;
let _currentRole   = null;
let _pendingConfirm = null;

/* ── Page groups for matrix display ─────────────────────── */
const PAGE_GROUPS = {
  mainPages: { ar: 'الصفحات الرئيسية', en: 'Main Pages', pages: ['Dashboard','OwnerDashboard','Reports'] },
  financialOps: { ar: 'العمليات المالية', en: 'Financial Operations', pages: ['Transactions','Receipts','Installments','Recurring'] },
  records: { ar: 'السجلات', en: 'Records', pages: ['Donors','Beneficiaries','Inventory','Projects'] },
  settings: { ar: 'الإعدادات', en: 'Settings', pages: ['Settings','Permissions'] },
  referenceData: { ar: 'بيانات المرجعية', en: 'Reference Data', pages: ['Categories','DonorTypes','IslamicClasses','NeedTypes','PaymentMethods','AidFrequencies','ProjectStatuses','ProjectCategories','Governorates','NotificationPrefs'] }
};

const PERM_COLS = [
  { key:'CanView',         label:'عرض',    en:'View' },
  { key:'CanCreate',       label:'إضافة',  en:'Create' },
  { key:'CanEdit',         label:'تعديل',  en:'Edit' },
  { key:'CanDelete',       label:'حذف',    en:'Delete' },
  { key:'CanViewDeleted',  label:'محذوف',  en:'Deleted' },
  { key:'CanViewSensitive',label:'حساس',   en:'Sensitive' },
  { key:'CanExport',       label:'تصدير',  en:'Export' }
];

const BUILTIN_ROLES = ['SuperAdmin','Director','AccountManager','CaseManager','DataEntry','InventoryManager','Viewer'];

const ROLE_LABELS = {
  SuperAdmin:      { get ar() { return t('roleSuperAdmin')      || 'مسؤول النظام الكامل'; },   get desc() { return t('roleSuperAdminDesc')      || 'صلاحيات كاملة على جميع الصفحات والبيانات'; } },
  Director:        { get ar() { return t('roleDirector')        || 'المدير التنفيذي'; },         get desc() { return t('roleDirectorDesc')        || 'صلاحيات تشغيلية كاملة مع حذف العمليات المالية'; } },
  AccountManager:  { get ar() { return t('roleAccountManager')  || 'مسؤول الحسابات'; },          get desc() { return t('roleAccountManagerDesc')  || 'صلاحيات كاملة على الوحدات المالية'; } },
  CaseManager:     { get ar() { return t('roleCaseManager')     || 'مسؤول الحالات'; },           get desc() { return t('roleCaseManagerDesc')     || 'صلاحيات كاملة على المستفيدين والمشاريع'; } },
  DataEntry:       { get ar() { return t('roleDataEntry')       || 'موظف إدخال بيانات'; },       get desc() { return t('roleDataEntryDesc')       || 'إضافة وتعديل فقط — بدون حذف'; } },
  InventoryManager:{ get ar() { return t('roleInventoryManager')|| 'مسؤول المخزون'; },           get desc() { return t('roleInventoryManagerDesc')|| 'صلاحيات كاملة على المخزون العيني'; } },
  Viewer:          { get ar() { return t('roleViewer')          || 'مشاهد فقط'; },               get desc() { return t('roleViewerDesc')          || 'قراءة فقط على لوحة التحكم والتقارير'; } }
};

/* ── Init ───────────────────────────────────────────────── */
initPageAuth({
  pageName: '',
  onLoadLocal: (email, sid) => {
    _email = email; _sid = sid;
  },
  onReady: async (sid, email, token, perms) => {
    _sid = sid; _email = email;
    _perms = {
      canView: true, canCreate: true, canEdit: true,
      canDelete: true, canViewDeleted: true,
      canViewSensitive: true, canExport: true
    };
    await Promise.all([loadUsers(), loadRoles()]);
    populateRoleDropdowns();

    const me = _users.find(u => u.Email?.toLowerCase() === email.toLowerCase());
    if (me && (!me.LastLogin || me.LastLogin.trim() === '')) {
      try {
        await updateRow(sid, 'Users', me.RecordID,
          { LastLogin: getCurrentTimestamp() }, email);
      } catch { /* non-critical */ }
    }
  }
});

/* ── Tab Switching ──────────────────────────────────────── */
function switchTab(tab) {
  ['users','roles','matrix'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`).style.display = t === tab ? 'block' : 'none';
  });
  if (tab === 'roles') renderRoles();
  if (tab === 'matrix') populateMatrixRoleSelect();
}

/* ══════════════════════════════════════════════════════════
   USERS TAB
══════════════════════════════════════════════════════════ */
async function loadUsers() {
  try {
    _users = await readSheet(_sid, 'Users',
      { includeDeleted: true, email: _email, forceRefresh: true });
    renderUsers();
  } catch (e) {
    document.getElementById('usersBody').innerHTML =
      `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--color-out);">${t('errLoadFailed')} — ${escapeHTML(e.message)}</td></tr>`;
  }
}

function renderUsers(list) {
  const data = list || (_showDeleted ? _users : _users.filter(u => u.IsDeleted !== 'TRUE'));
  const body = document.getElementById('usersBody');

  if (!data.length) {
    body.innerHTML = `<tr><td colspan="6">
      <div class="empty-state">
        <div class="empty-state-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
        <div class="empty-state-title">${t('noUsers')}</div>
        <div class="empty-state-text">${t('noUsersHint')}</div>
      </div>
    </td></tr>`;
    return;
  }

  body.innerHTML = data.map(u => {
    const isDeleted  = u.IsDeleted === 'TRUE';
    const initials   = (u.FullName || u.Email || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
    const roleLabel  = ROLE_LABELS[u.Role]?.ar || u.Role || '—';
    const statusBadge = u.Status === 'Active'
      ? `<span class="badge status-active badge-dot">${t('active')}</span>`
      : `<span class="badge status-inactive badge-dot">${t('inactive')}</span>`;

    const actions = isDeleted
      ? (_perms?.canViewDeleted
          ? `<button class="btn btn-sm btn-secondary" onclick="restoreUser('${u.RecordID}')">${t('restore')}</button>`
          : '')
      : `
        <button class="btn btn-sm btn-secondary btn-icon" onclick="openUserModal('${u.RecordID}')" title="${t('edit')}" ${!_perms?.canEdit ? 'disabled' : ''}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        ${u.Email !== _email && _perms?.canDelete ? `
        <button class="btn btn-sm btn-danger btn-icon" onclick="confirmDeleteUser('${u.RecordID}')" title="${t('delete')}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>` : ''}
      `;

    return `<tr class="${isDeleted ? 'row-deleted' : ''}">
  <td>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="user-avatar" style="background:var(--blue-600);width:34px;height:34px;font-size:0.72rem;">${initials}</div>
      <div>
        <div style="font-weight:500;">${escapeHTML(u.FullName || '—')}</div>
        <div style="font-size:0.75rem;color:var(--text-muted);" dir="ltr">${escapeHTML(u.Email || '—')}</div>
      </div>
    </div>
   </td>
  <td><span class="badge badge-blue">${escapeHTML(roleLabel)}</span>${isDeleted ? `<span class="badge badge-deleted" style="margin-right:4px;">${t('deleted')}</span>` : ''}</td>
  <td>${isDeleted ? '—' : statusBadge}</td>
  <td style="font-size:0.8rem;color:var(--text-muted);">${formatDisplayDateTime(u.LastLogin) || '—'}</td>
  <td style="font-size:0.8rem;color:var(--text-muted);">${formatDisplayDate(u.CreatedAt)}</td>
  <td><div style="display:flex;gap:6px;">${actions}</div></td>
              </tr>`;
  }).join('');
}

function filterUsers(q) {
  if (!q.trim()) { renderUsers(); return; }
  const lq = q.toLowerCase();
  const filtered = _users
    .filter(u => _showDeleted || u.IsDeleted !== 'TRUE')
    .filter(u =>
      (u.FullName  || '').toLowerCase().includes(lq) ||
      (u.Email     || '').toLowerCase().includes(lq) ||
      (u.Role      || '').toLowerCase().includes(lq)
    );
  renderUsers(filtered);
}

function toggleDeleted(val) {
  _showDeleted = val;
  renderUsers();
}

/* ── User Modal ─────────────────────────────────────────── */
function openUserModal(recordID = null) {
  _editingUser = null;
  document.getElementById('uRecordID').value = '';
  document.getElementById('uFullName').value = '';
  document.getElementById('uEmail').value    = '';
  document.getElementById('uRole').value     = '';
  document.getElementById('uStatus').value   = 'Active';
  document.getElementById('uNotes').value    = '';
  document.getElementById('uEmail').disabled = false;
  document.getElementById('userModalTitle').textContent = t('addUserTitle');

  if (recordID) {
    const u = _users.find(x => x.RecordID === recordID);
    if (!u) return;
    _editingUser = u;
    document.getElementById('userModalTitle').textContent = t('editUserTitle');
    document.getElementById('uRecordID').value = u.RecordID;
    document.getElementById('uFullName').value = u.FullName  || '';
    document.getElementById('uEmail').value    = u.Email     || '';
    document.getElementById('uRole').value     = u.Role      || '';
    document.getElementById('uStatus').value   = u.Status    || 'Active';
    document.getElementById('uNotes').value    = u.Notes     || '';
    document.getElementById('uEmail').disabled = true;
  }

  openModal('userModal');
}

async function saveUser() {
  const name   = document.getElementById('uFullName').value.trim();
  const email  = document.getElementById('uEmail').value.trim().toLowerCase();
  const role   = document.getElementById('uRole').value;
  const status = document.getElementById('uStatus').value;
  const notes  = document.getElementById('uNotes').value.trim();

  if (!name || !email || !role) {
    ['uFullName','uEmail','uRole'].forEach(id => {
      document.getElementById(id).classList.toggle('error', !document.getElementById(id).value.trim());
    });
    showToast(t('requiredFields'), 'error');
    return;
  }

  const btn = document.getElementById('saveUserBtn');
  btn.disabled = true; btn.textContent = t('saving');

  try {
    if (_editingUser) {
      await updateRow(_sid, 'Users', _editingUser.RecordID,
        { FullName: name, Role: role, Status: status, Notes: notes }, _email);
      showToast(t('successSaved'), 'success');
    } else {
      const existing = _users.map(u => u.Email?.toLowerCase());
      if (existing.includes(email)) {
        showToast(t('emailExists'), 'error');
        btn.disabled = false; btn.textContent = t('saveUser');
        return;
      }
      await appendRow(_sid, 'Users', {
        Email: email, FullName: name, Role: role,
        Status: status, LastLogin: '', Notes: notes
      }, _email);
      showToast(t('successSaved'), 'success');
    }
    closeModal('userModal');
    await loadUsers();
    populateRoleDropdowns();
  } catch (e) {
    showToast(t('errSaveFailed') + ': ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = t('saveUser');
  }
}

function confirmDeleteUser(recordID) {
  const u = _users.find(x => x.RecordID === recordID);
  if (!u) return;
  document.getElementById('confirmTitle').textContent = t('deleteUserTitle');
  const msg = LANG === 'ar'
    ? `هل تريد حذف "${u.FullName || u.Email}"؟ سيتم تعطيل وصوله للنظام.`
    : `Delete "${u.FullName || u.Email}"? Their system access will be disabled.`;
  document.getElementById('confirmMsg').textContent = msg;
  _pendingConfirm = () => deleteUser(recordID);
  document.getElementById('confirmOk').onclick = () => { closeModal('confirmModal'); _pendingConfirm?.(); };
  openModal('confirmModal');
}

async function deleteUser(recordID) {
  try {
    await softDelete(_sid, 'Users', recordID, _email);
    await loadUsers();
  } catch (e) {
    showToast(t('errDeleteFailed') + ': ' + e.message, 'error');
  }
}

async function restoreUser(recordID) {
  try {
    await restoreRecord(_sid, 'Users', recordID, _email);
    await loadUsers();
  } catch (e) {
    showToast(t('errSaveFailed') + ': ' + e.message, 'error');
  }
}

/* ══════════════════════════════════════════════════════════
   ROLES TAB
══════════════════════════════════════════════════════════ */
async function loadRoles() {
  try {
    _roles = await readSheet(_sid, 'Roles',
      { includeDeleted: false, email: _email, forceRefresh: true });
  } catch (e) {
    _roles = [];
  }
}

function renderRoles() {
  const grid = document.getElementById('rolesGrid');

  /* Merge builtin + custom */
 const builtinRows = BUILTIN_ROLES.map(rid => {
  const existing = _roles.find(r => r.RoleID === rid);
  return {
    ...(existing || {}),
    RoleID:      rid,
    RoleName:    ROLE_LABELS[rid]?.ar    || existing?.RoleName    || rid,
    Description: ROLE_LABELS[rid]?.desc  || existing?.Description || ''
  };
});

  const customRows = _roles.filter(r => !BUILTIN_ROLES.includes(r.RoleID) && r.IsDeleted !== 'TRUE');
  const allRoles   = [...builtinRows, ...customRows];

  const userCountByRole = {};
  _users.filter(u => u.IsDeleted !== 'TRUE').forEach(u => {
    userCountByRole[u.Role] = (userCountByRole[u.Role] || 0) + 1;
  });

  grid.innerHTML = allRoles.map(r => {
    const isBuiltin = BUILTIN_ROLES.includes(r.RoleID);
    const count     = userCountByRole[r.RoleID] || 0;
    return `
      <div class="role-card">
        <div class="role-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="role-info">
          <div class="role-name">${escapeHTML(r.RoleName || r.RoleID)}</div>
          <div style="font-size:0.72rem;color:var(--text-muted);font-family:monospace;" dir="ltr">${escapeHTML(r.RoleID)}</div>
          <div class="role-desc">${escapeHTML(r.Description || '')}</div>
          <div class="role-count" style="margin-top:4px;">${count} ${LANG === 'ar' ? 'مستخدم' : 'user(s)'}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
          ${isBuiltin
            ? `<span class="badge badge-blue" style="font-size:0.65rem;">${LANG === 'ar' ? 'مدمج' : 'Built-in'}</span>`
            : `<button class="btn btn-sm btn-secondary btn-icon" onclick="openRoleModal('${r.RoleID}')" title="تعديل" ${!_perms?.canEdit ? 'disabled' : ''}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              ${count === 0 && _perms?.canDelete
                ? `<button class="btn btn-sm btn-danger btn-icon" onclick="confirmDeleteRole('${r.RoleID}')" title="حذف">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                  </button>` : ''}`
          }
        </div>
      </div>
    `;
  }).join('');
}

/* ── Role Modal ─────────────────────────────────────────── */
function openRoleModal(roleID = null) {
  _editingRole = null;
  document.getElementById('rRecordID').value = '';
  document.getElementById('rRoleID').value   = '';
  document.getElementById('rDesc').value     = '';
  document.getElementById('rRoleID').disabled = false;
  document.getElementById('roleModalTitle').textContent = t('addRoleTitle');

  if (roleID) {
    const r = _roles.find(x => x.RoleID === roleID);
    if (!r) return;
    _editingRole = r;
    document.getElementById('roleModalTitle').textContent = t('editRoleTitle');
    document.getElementById('rRecordID').value = r.RecordID || '';
    document.getElementById('rRoleID').value   = r.RoleID   || '';
    document.getElementById('rDesc').value     = r.Description || '';
    document.getElementById('rRoleID').disabled = true;
  }

  openModal('roleModal');
}

async function saveRole() {
  const roleID = document.getElementById('rRoleID').value.trim().replace(/\s+/g, '');
  const desc   = document.getElementById('rDesc').value.trim();

  if (!roleID || !desc) {
    ['rRoleID','rDesc'].forEach(id => {
      document.getElementById(id).classList.toggle('error', !document.getElementById(id).value.trim());
    });
    showToast(t('requiredFields'), 'error');
    return;
  }

  const btn = document.getElementById('saveRoleBtn');
  btn.disabled = true; btn.textContent = t('saving');

  try {
    if (_editingRole) {
      await updateRow(_sid, 'Roles', _editingRole.RecordID,
        { Description: desc }, _email);
      showToast(t('successSaved'), 'success');
    } else {
      if (_roles.find(r => r.RoleID === roleID)) {
        showToast(t('roleExists'), 'error');
        btn.disabled = false; btn.textContent = t('saveRole');
        return;
      }
      await appendRow(_sid, 'Roles', { RoleID: roleID, RoleName: roleID, Description: desc }, _email);

      /* Seed permissions for new role — all FALSE */
      const permRows = ALL_PAGES.map(page => ({
        RoleID: roleID, PageName: page,
        CanView: 'FALSE', CanCreate: 'FALSE', CanEdit: 'FALSE',
        CanDelete: 'FALSE', CanViewDeleted: 'FALSE',
        CanViewSensitive: 'FALSE', CanExport: 'FALSE'
      }));
      for (const row of permRows) {
        await appendRow(_sid, 'Permissions', row, _email);
      }

      showToast(t('successSaved'), 'success');
    }

    closeModal('roleModal');
    await loadRoles();
    renderRoles();
    populateRoleDropdowns();
    populateMatrixRoleSelect();
  } catch (e) {
    showToast(t('errSaveFailed') + ': ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = t('saveRole');
  }
}

function confirmDeleteRole(roleID) {
  document.getElementById('confirmTitle').textContent = t('deleteRoleTitle');
  const msg = LANG === 'ar'
    ? `هل تريد حذف الدور "${roleID}"؟ لا يمكن حذف دور مرتبط بمستخدمين.`
    : `Delete role "${roleID}"? Roles assigned to users cannot be deleted.`;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmOk').onclick = () => { closeModal('confirmModal'); deleteRole(roleID); };
  openModal('confirmModal');
}

async function deleteRole(roleID) {
  const r = _roles.find(x => x.RoleID === roleID);
  if (!r) return;
  try {
    await softDelete(_sid, 'Roles', r.RecordID, _email);
    await loadRoles();
    renderRoles();
    populateRoleDropdowns();
    populateMatrixRoleSelect();
  } catch (e) {
    showToast(t('errDeleteFailed') + ': ' + e.message, 'error');
  }
}

/* ── Populate role dropdowns across the page ────────────── */
function populateRoleDropdowns() {
  const sel = document.getElementById('uRole');
  if (!sel) return;
  const current = sel.value;
  sel.innerHTML = `<option value="">${t('selectRole')}</option>`;

  const builtins = BUILTIN_ROLES.map(rid => ({
    RoleID: rid,
    label: ROLE_LABELS[rid]?.ar || rid
  }));

  const customs = _roles
    .filter(r => !BUILTIN_ROLES.includes(r.RoleID) && r.IsDeleted !== 'TRUE')
    .map(r => ({ RoleID: r.RoleID, label: r.Description || r.RoleID }));

  [...builtins, ...customs].forEach(({ RoleID, label }) => {
    const opt = document.createElement('option');
    opt.value = RoleID; opt.textContent = label;
    if (RoleID === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

/* ══════════════════════════════════════════════════════════
   PERMISSIONS MATRIX TAB
══════════════════════════════════════════════════════════ */
function populateMatrixRoleSelect() {
  const sel = document.getElementById('matrixRoleSelect');
  if (!sel) return;
  const current = sel.value;
  sel.innerHTML = `<option value="">${t('selectRole')}</option>`;

  const builtins = BUILTIN_ROLES.map(rid => ({ RoleID: rid, label: ROLE_LABELS[rid]?.ar || rid }));
  const customs  = _roles.filter(r => !BUILTIN_ROLES.includes(r.RoleID) && r.IsDeleted !== 'TRUE')
    .map(r => ({ RoleID: r.RoleID, label: r.Description || r.RoleID }));

  [...builtins, ...customs].forEach(({ RoleID, label }) => {
    const opt = document.createElement('option');
    opt.value = RoleID; opt.textContent = label;
    if (RoleID === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function loadMatrix(roleID) {
  if (!roleID) {
    document.getElementById('matrixWrapper').style.display = 'none';
    document.getElementById('matrixEmpty').style.display   = 'flex';
    document.getElementById('matrixRoleDesc').textContent  = '';
    return;
  }

  _currentRole = roleID;
  const desc = ROLE_LABELS[roleID]?.desc || _roles.find(r => r.RoleID === roleID)?.Description || '';
  document.getElementById('matrixRoleDesc').textContent = desc;

  document.getElementById('matrixWrapper').style.display = 'block';
  document.getElementById('matrixEmpty').style.display   = 'none';
  document.getElementById('matrixBody').innerHTML =
    `<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text-muted);">
      <div class="spinner spinner-sm" style="margin:0 auto 8px;"></div>${t('loading')}…
    </td></tr>`;

  try {
    _matrix = await readSheet(_sid, 'Permissions',
      { includeDeleted: false, email: _email, forceRefresh: true });
    renderMatrix(roleID);
  } catch (e) {
    showToast(t('errLoadFailed') + ': ' + e.message, 'error');
  }
}

function renderMatrix(roleID) {
  const body = document.getElementById('matrixBody');
  const rolePerms = {};
  _matrix.filter(r => r.RoleID === roleID).forEach(r => { rolePerms[r.PageName] = r; });

  let html = '';
  for (const [groupKey, group] of Object.entries(PAGE_GROUPS)) {
    const groupLabel = LANG === 'ar' ? group.ar : group.en;
    html += `<tr class="page-group-row"><td colspan="8">${escapeHTML(groupLabel)}</td></tr>`;
    group.pages.forEach(page => {
      const p = rolePerms[page] || {};
      const pageName = getPageLabel(page);
      html += `<tr>
        <td style="font-weight:500;">${pageName}<div style="font-size:0.72rem;color:var(--text-muted);" dir="ltr">${page}</div></td>
        ${PERM_COLS.map(col => `
          <td>
            <div class="toggle-wrap">
              <label class="toggle">
                <input type="checkbox"
                  ${p[col.key] === 'TRUE' ? 'checked' : ''}
                  ${!_perms?.canEdit || roleID === 'SuperAdmin' ? 'disabled' : ''}
                  onchange="savePerm('${roleID}','${page}','${col.key}',this.checked,'${p.RecordID || ''}')">
                <span class="toggle-slider"></span>
              </label>
            </div>
          </td>`).join('')}
      </tr>`;
    });
  }

  body.innerHTML = html;

  if (roleID === 'SuperAdmin') {
    const msg = LANG === 'ar' ? 'المسؤول الكامل — لا يمكن تعديل صلاحياته' : 'Full administrator — permissions cannot be edited';
    document.getElementById('matrixRoleDesc').textContent = msg;
  }
}

let _saveTimer = null;

async function savePerm(roleID, pageName, permKey, value, recordID) {
  setSavingState('saving');

  const existing = _matrix.find(r => r.RoleID === roleID && r.PageName === pageName);

  try {
    if (existing && existing.RecordID) {
      await updateRow(_sid, 'Permissions', existing.RecordID,
        { [permKey]: value ? 'TRUE' : 'FALSE' }, _email);
      existing[permKey] = value ? 'TRUE' : 'FALSE';
    } else {
      const newRow = {
        RoleID: roleID, PageName: pageName,
        CanView: 'FALSE', CanCreate: 'FALSE', CanEdit: 'FALSE',
        CanDelete: 'FALSE', CanViewDeleted: 'FALSE',
        CanViewSensitive: 'FALSE', CanExport: 'FALSE',
        [permKey]: value ? 'TRUE' : 'FALSE'
      };
      const created = await appendRow(_sid, 'Permissions', newRow, _email);
      _matrix.push({ ...newRow, RecordID: created.RecordID });
    }
    setSavingState('saved');
  } catch (e) {
    showToast(t('errSaveFailed') + ': ' + e.message, 'error');
    setSavingState('error');
  }
}

function setSavingState(state) {
  const pill = document.getElementById('matrixSavingPill');
  const text = document.getElementById('matrixSavingText');
  if (!pill) return;
  pill.style.display = 'inline-flex';
  pill.className = `saving-pill ${state === 'saving' ? 'saving' : state === 'saved' ? 'saved' : ''}`;
  text.textContent = state === 'saving' ? t('saving') : state === 'saved' ? t('saved') : t('error');
  if (state === 'saved') {
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => { pill.style.display = 'none'; }, 2500);
  }
}

    Receipts: { ar: 'الإيصالات', en: 'Receipts' },
    Installments: { ar: 'الأقساط', en: 'Installments' },
    Recurring: { ar: 'المصروفات الدورية', en: 'Recurring' },
    Donors: { ar: 'المتبرعون', en: 'Donors' },
    Beneficiaries: { ar: 'المستفيدون', en: 'Beneficiaries' },
    Inventory: { ar: 'المخزون', en: 'Inventory' },
    Projects: { ar: 'المشاريع', en: 'Projects' },
    Settings: { ar: 'الإعدادات', en: 'Settings' },
    Permissions: { ar: 'الصلاحيات', en: 'Permissions' },
    Categories: { ar: 'الفئات', en: 'Categories' },
    DonorTypes: { ar: 'أنواع المتبرعين', en: 'Donor Types' },
    IslamicClasses: { ar: 'التصنيفات الإسلامية', en: 'Islamic Classes' },
    NeedTypes: { ar: 'أنواع الاحتياجات', en: 'Need Types' },
    PaymentMethods: { ar: 'طرق الدفع', en: 'Payment Methods' },

  return label ? (LANG === 'ar' ? label.ar : label.en) : page;
}

/* ── Modal helpers ──────────────────────────────────────── */
function openModal(id)  { document.getElementById(id).classList.add('open');    document.body.style.overflow = 'hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow = ''; }
